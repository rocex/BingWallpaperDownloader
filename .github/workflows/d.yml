name: CI

on: 
  push:
    branches: [ main ]
    paths:
    - 'source/**'
    - 'dub.json'
    - '.github/workflows/**'
  pull_request:
    branches: [ main ]
    paths:
    - 'source/**'
    - 'dub.json'
    - '.github/workflows/**'

jobs:
  test:
    name: Dub Tests
    strategy:
      matrix:
        os: [ windows-latest]
        dc: [ dmd-latest ]
    runs-on: ${{ matrix.os }}
    
    steps:
      - uses: actions/checkout@v2
      - uses: dlang-community/setup-dlang@v1
        with:
          compiler: ${{ matrix.dc }}
          
      - name: compile
        run: dub build --build=release --arch=x86_64
        
