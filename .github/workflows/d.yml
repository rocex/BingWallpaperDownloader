name: Auto Build

on: 
  push:
    branches: [ main ]
    paths:
    - 'source/**'
    - 'dub.json'
    - '.github/workflows/**'
  pull_request:
    branches: [ main ]
    paths:
    - 'source/**'
    - 'dub.json'
    - '.github/workflows/**'

jobs:
  build:
    name: Dub Build
    strategy:
      matrix:
        os: [ windows-latest]
        dc: [ dmd-latest ]
        include:
          - os: windows-latest
            DMD_HOME: C:\hostedtoolcache\windows\dmd\2.112.0\x64\dmd2
    runs-on: ${{ matrix.os }}

    env:
      DMD_HOME: ${{ matrix.DMD_HOME }}
    
    steps:
      - name: checkout code
        uses: actions/checkout@v5

      - name: setup dlang
        uses: dlang-community/setup-dlang@v2
        with:
          compiler: ${{ matrix.dc }}
        
      - name: build
        run: dub build --build=release

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bing-wallpaper-downloader-windows-x64
          path: |
            .dub/BingWallpaperDownloader.exe
            .dub/libcurl.dll
