name: auto build

on: 
  push:
    branches: [ main ]
    paths:
    - 'source/**'
    - 'dub.json'
    - '.github/workflows/**'
  pull_request:
    branches: [ main ]
    paths:
    - 'source/**'
    - 'dub.json'
    - '.github/workflows/**'

jobs:
  build:
    name: Dub Build
    strategy:
      matrix:
        os: [ windows-latest]
        dc: [ dmd-latest ]
    runs-on: ${{ matrix.os }}
    
    steps:
      - name: checkout code
        uses: actions/checkout@v2

      - name: setup dlang
        uses: dlang-community/setup-dlang@v2
        with:
          compiler: ${{ matrix.dc }}
        
      - name: build
        run: dub build --build=release

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bing-wallpaper-downloader-windows-x64
          path: |
            .dub/BingWallpaperDownloader.exe
